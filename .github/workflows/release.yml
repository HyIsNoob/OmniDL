# Before tagging: set version in package.json, add a ## [x.y.z] section to CHANGELOG.md, commit.
# Then: git tag vX.Y.Z && git push origin vX.Y.Z
#
# Publishing uses `electron-builder --publish always` so latest.yml, .exe, and .blockmap are uploaded
# in one step. Do not replace only the Setup .exe on the release page — that causes sha512 mismatch.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app bundle
        run: npm run build

      - name: Write release notes from CHANGELOG
        run: node scripts/extract-changelog.mjs "${{ github.ref_name }}"

      - name: Publish to GitHub (installers + latest.yml + blockmaps, single atomic publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
